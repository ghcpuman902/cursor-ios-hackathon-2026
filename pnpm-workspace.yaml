# pnpm 11 blocks dependency build scripts unless explicitly allowed/denied.
# Pre-approve here so fresh clones (and agent sandboxes) can `pnpm install` + `pnpm dev`
# without an interactive `pnpm approve-builds` step.
allowBuilds:
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@ai-sdk/gateway@4.0.15'
  - '@ai-sdk/provider-utils@5.0.7'
  - '@ai-sdk/provider@4.0.3'
  - ai@7.0.19
